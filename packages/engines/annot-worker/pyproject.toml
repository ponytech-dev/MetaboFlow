[project]
name = "metaboflow-annot-worker"
version = "0.1.0"
description = "MS2 spectral matching annotation service for MetaboFlow"
requires-python = ">=3.11"
dependencies = [
    "matchms>=0.26",
    "fastapi>=0.115",
    "uvicorn>=0.32",
    "pydantic>=2.10",
    "pydantic-settings>=2.6",
    "numpy>=1.26",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "httpx>=0.27"]

[tool.ruff]
target-version = "py311"
line-length = 100
