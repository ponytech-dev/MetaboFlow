[project]
name = "metaboflow-sirius-worker"
version = "0.1.0"
description = "SIRIUS/CSI:FingerID structure prediction service for MetaboFlow"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115",
    "uvicorn>=0.32",
    "pydantic>=2.10",
    "pydantic-settings>=2.6",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "httpx>=0.27"]

[tool.ruff]
target-version = "py311"
line-length = 100
